<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Florería Valeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-soft">
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-pink" th:href="@{/catalogo}">🌸 Florería Valeria</a>
    </div>
</nav>

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold">Iniciar sesión</h1>
                        <p class="text-muted mb-0">Accede como cliente o administrador.</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger rounded-3">
                        Usuario o contraseña incorrectos.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success rounded-3">
                        Sesión cerrada correctamente.
                    </div>

                    <form th:action="@{/login}" method="post" class="vstack gap-3">
                        <div>
                            <label class="form-label">Correo o usuario</label>
                            <input type="text" name="username" class="form-control form-control-lg rounded-3" placeholder="cliente@test.com" required>
                        </div>

                        <div>
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-pink btn-lg rounded-3 w-100">Entrar</button>
                    </form>

                    <hr class="my-4">

                    <div class="small text-muted">
                        <div><strong>Cliente:</strong> cliente@test.com / 1234</div>
                        <div><strong>Admin:</strong> admin@test.com / admin123</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
