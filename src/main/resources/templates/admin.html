<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Florería Valeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-soft">
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-pink" th:href="@{/catalogo}">🌸 Florería Valeria</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary rounded-pill" th:href="@{/catalogo}">Catálogo</a>
            <a class="btn btn-outline-secondary rounded-pill" th:href="@{/carrito}">Carrito</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-pink rounded-pill" type="submit">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="h3 fw-bold mb-1">Panel de administración</h1>
            <p class="text-muted mb-0">Crea, edita y elimina productos del catálogo.</p>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success rounded-4 shadow-sm" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger rounded-4 shadow-sm" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h2 class="h4 fw-bold mb-3" th:text="${modoEdicion} ? 'Editar producto' : 'Nuevo producto'"></h2>

                    <form th:action="${modoEdicion} ? @{'/admin/actualizar/' + ${producto.id}} : @{/admin/guardar}" th:object="${producto}" method="post" class="vstack gap-3">
                        <div>
                            <label class="form-label">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control rounded-3">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div>
                            <label class="form-label">Tipo</label>
                            <input type="text" th:field="*{tipo}" class="form-control rounded-3" placeholder="Rosas, Tulipanes, Bouquet...">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                        </div>

                        <div>
                            <label class="form-label">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control rounded-3" rows="3"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Precio</label>
                                <input type="number" step="0.01" th:field="*{precio}" class="form-control rounded-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Stock</label>
                                <input type="number" th:field="*{stock}" class="form-control rounded-3">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                            </div>
                        </div>

                        <div>
                            <label class="form-label">Ruta de imagen</label>
                            <input type="text" th:field="*{imagen}" class="form-control rounded-3" placeholder="/images/rosas.svg">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('imagen')}" th:errors="*{imagen}"></div>
                        </div>

                        <div class="d-flex gap-2 flex-wrap">
                            <button type="submit" class="btn btn-pink rounded-pill" th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>
                            <a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill">Limpiar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h2 class="h4 fw-bold mb-3">Productos registrados</h2>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Imagen</th>
                                    <th>Nombre</th>
                                    <th>Tipo</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${productos}">
                                    <td><img th:src="@{${p.imagen}}" th:alt="${p.nombre}" class="admin-thumb rounded-3"></td>
                                    <td class="fw-semibold" th:text="${p.nombre}"></td>
                                    <td th:text="${p.tipo}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(p.precio, 0, 'POINT', 0, 'COMMA')}"></td>
                                    <td th:text="${p.stock}"></td>
                                    <td class="text-end">
                                        <div class="d-flex gap-2 justify-content-end">
                                            <a class="btn btn-sm btn-outline-dark rounded-pill" th:href="@{'/admin/editar/' + ${p.id}}">Editar</a>
                                            <a class="btn btn-sm btn-outline-danger rounded-pill" th:href="@{'/admin/eliminar/' + ${p.id}}" onclick="return confirm('¿Eliminar este producto?')">Eliminar</a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(productos)}">
                                    <td colspan="6" class="text-center text-muted py-4">No hay productos registrados todavía.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
